<svg width="1200" height="960" viewBox="0 0 1200 960" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800;900&family=Share+Tech+Mono&display=swap');

    @keyframes glow {
      0%,100% {
        filter: drop-shadow(0 0 8px #7a0019) drop-shadow(0 0 16px #7a0019) drop-shadow(0 0 28px #b11226);
        opacity:.92;
      }
      50% {
        filter: drop-shadow(0 0 14px #7a0019) drop-shadow(0 0 30px #7a0019) drop-shadow(0 0 44px #b11226);
        opacity:1;
      }
    }

    @keyframes scan {
      0% { transform: translateY(-70px); opacity:0; }
      20% { opacity:.40; }
      100% { transform: translateY(1010px); opacity:0; }
    }

    @keyframes move {
      0% { transform: translateY(-960px); opacity:.08; }
      50% { opacity:.55; }
      100% { transform: translateY(960px); opacity:.08; }
    }

    @keyframes dash {
      to { stroke-dashoffset:-180; }
    }

    .bg { fill:#040000; }
    .gif { opacity:.48; }
    .overlay { fill:#040000; opacity:.76; }
    .red { fill:#7a0019; opacity:.10; }

    .card {
      fill:rgba(6,0,1,.92);
      stroke:#4a000f;
      stroke-width:2;
      animation:glow 3s ease-in-out infinite;
    }

    .panel {
      fill:rgba(12,0,4,.88);
      stroke:#7a0019;
      stroke-width:1.5;
    }

    .title {
      font-family:"Orbitron","Arial Black",sans-serif;
      font-size:32px;
      font-weight:900;
      fill:#d61c3b;
      letter-spacing:2px;
      animation:glow 2.4s ease-in-out infinite;
    }

    .head {
      font-family:"Orbitron","Arial Black",sans-serif;
      font-size:20px;
      font-weight:900;
      fill:#f0d7dc;
      letter-spacing:1px;
    }

    .text {
      font-family:"Share Tech Mono","Courier New",monospace;
      font-size:18px;
      fill:#ffffff;
      font-weight:700;
    }

    .small {
      font-family:"Share Tech Mono","Courier New",monospace;
      font-size:16px;
      fill:#c98b96;
      font-weight:700;
    }

    .muted {
      font-family:"Share Tech Mono","Courier New",monospace;
      font-size:17px;
      fill:#d0a3ab;
      font-weight:700;
    }

    .barbg { fill:#160006; stroke:#3b000c; stroke-width:1; }
    .bar {
      fill:#7a0019;
      filter:drop-shadow(0 0 7px #7a0019) drop-shadow(0 0 14px #7a0019);
    }
    .barLight { fill:#d61c3b; }

    .matrix {
      font-family:"Share Tech Mono","Courier New",monospace;
      font-size:17px;
      fill:#7a0019;
      opacity:.45;
      animation:move 9s linear infinite;
    }

    .matrix2 { animation-delay:3s; opacity:.30; }

    .scan {
      fill:#7a0019;
      opacity:.20;
      animation:scan 4s linear infinite;
    }

    .dash {
      stroke:#7a0019;
      stroke-width:2;
      stroke-dasharray:16 10;
      animation:dash 5s linear infinite;
      opacity:.55;
    }

    .pill {
      fill:#100004;
      stroke:#4a000f;
      stroke-width:1;
    }

    .pillText {
      font-family:"Orbitron","Arial Black",sans-serif;
      font-size:14px;
      font-weight:900;
      fill:#f0d7dc;
      letter-spacing:.6px;
    }
  </style>

  <rect class="bg" width="1200" height="960" rx="0"/>

