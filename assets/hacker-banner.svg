<svg width="1200" height="390" viewBox="0 0 1200 390" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes glow {
      0%,100% {
        opacity:.9;
        filter:
          drop-shadow(0 0 8px #ff002f)
          drop-shadow(0 0 18px #ff002f)
          drop-shadow(0 0 35px #ff002f);
      }
      50% {
        opacity:1;
        filter:
          drop-shadow(0 0 16px #ff002f)
          drop-shadow(0 0 34px #ff002f)
          drop-shadow(0 0 60px #ff002f);
      }
    }

    @keyframes scan {
      0% { transform: translateY(-60px); opacity:0; }
      25% { opacity:.45; }
      100% { transform: translateY(430px); opacity:0; }
    }

    @keyframes move {
      0% { transform: translateY(-390px); opacity:.07; }
      50% { opacity:.45; }
      100% { transform: translateY(390px); opacity:.07; }
    }

    @keyframes borderDash {
      to { stroke-dashoffset: -180; }
    }

    @keyframes blink {
      0%,45% { opacity:1; }
      46%,100% { opacity:0; }
    }

    .bg { fill:#030000; }
    .dark { fill:#030000; opacity:.82; }
    .red { fill:#ff8fa3; opacity:.08; }

    .grid {
      stroke:#ff8fa3;
      stroke-opacity:.18;
    }

    .matrix {
      font-family:"Courier New",monospace;
      fill:#ff8fa3;
      font-size:18px;
      opacity:.42;
      animation:move 8s linear infinite;
    }

    .matrix2 { animation-delay:2s; opacity:.30; }
    .matrix3 { animation-delay:4s; opacity:.22; }

    .box {
      fill:rgba(5,0,1,.94);
      stroke:#ff8fa3;
      stroke-width:2.4;
      animation:glow 2.8s ease-in-out infinite;
    }

    .inner {
      fill:rgba(15,0,4,.90);
      stroke:#ffb3c1;
      stroke-width:1.6;
    }

    .topbar { fill:#170006; }

    .title {
      font-family:"Arial Black","Impact","Courier New",monospace;
      font-size:60px;
      font-weight:900;
      letter-spacing:3px;
      fill:#ff8fa3;
      animation:glow 2.2s ease-in-out infinite;
    }

    .subtitle {
      font-family:"Courier New",monospace;
      font-size:23px;
      fill:#ffe5ec;
      font-weight:900;
    }

    .small {
      font-family:"Courier New",monospace;
      font-size:15px;
      fill:#ffccd5;
      font-weight:900;
    }

    .scan {
      fill:#ff8fa3;
      opacity:.23;
      animation:scan 3.2s linear infinite;
    }

    .corner {
      stroke:#ff8fa3;
      stroke-width:3;
      filter:drop-shadow(0 0 10px ff0000);
    }

    .dash {
      stroke:#ff8fa3;
      stroke-width:2;
      stroke-dasharray:16 10;
      opacity:.70;
      animation:borderDash 4s linear infinite;
    }

    .cursor { animation:blink .8s infinite; }
  </style>

  <rect class="bg" width="1200" height="390" rx="0"/>

  <rect class="dark" width="1200" height="390" rx="0"/>
  <rect class="red" width="1200" height="390" rx="0"/>

  <g>
    <path class="grid" d="M0 45H1200"/>
    <path class="grid" d="M0 90H1200"/>
    <path class="grid" d="M0 135H1200"/>
    <path class="grid" d="M0 180H1200"/>
    <path class="grid" d="M0 225H1200"/>
    <path class="grid" d="M0 270H1200"/>
    <path class="grid" d="M0 315H1200"/>
    <path class="grid" d="M0 360H1200"/>

    <path class="grid" d="M80 0V390"/>
    <path class="grid" d="M160 0V390"/>
    <path class="grid" d="M240 0V390"/>
    <path class="grid" d="M320 0V390"/>
    <path class="grid" d="M400 0V390"/>
    <path class="grid" d="M480 0V390"/>
    <path class="grid" d="M560 0V390"/>
    <path class="grid" d="M640 0V390"/>
    <path class="grid" d="M720 0V390"/>
    <path class="grid" d="M800 0V390"/>
    <path class="grid" d="M880 0V390"/>
    <path class="grid" d="M960 0V390"/>
    <path class="grid" d="M1040 0V390"/>
    <path class="grid" d="M1120 0V390"/>
  </g>

  <g class="matrix">
    <text x="40" y="55">010101 101001 110010 001010</text>
    <text x="860" y="70">ACCESS GRANTED</text>
    <text x="90" y="135">SYSTEM ONLINE</text>
    <text x="835" y="150">RUNNING CODE</text>
    <text x="50" y="230">101010 010101 111000</text>
    <text x="940" y="245">DEBUG MODE</text>
    <text x="140" y="325">FRONTEND ACTIVE</text>
  </g>

  <g class="matrix matrix2">
    <text x="760" y="45">010101010101</text>
    <text x="50" y="90">REACT PHP JS</text>
    <text x="910" y="195">ROOT YEAGER</text>
    <text x="125" y="265">BUILD SUCCESS</text>
    <text x="760" y="335">CODE DEPLOYED</text>
  </g>

  <g class="matrix matrix3">
    <text x="420" y="45">DATABASE CONNECTED</text>
    <text x="500" y="340">NO BUGS FOUND</text>
    <text x="310" y="285">COMPILING</text>
  </g>

  <path class="corner" d="M45 70V28H105"/>
  <path class="corner" d="M1155 70V28H1095"/>
  <path class="corner" d="M45 320V362H105"/>
  <path class="corner" d="M1155 320V362H1095"/>

  <path class="dash" d="M125 55H1075"/>
  <path class="dash" d="M125 335H1075"/>

  <g>
    <rect class="box" x="150" y="78" width="900" height="230" rx="0"/>
    <rect class="topbar" x="150" y="78" width="900" height="48" rx="0"/>
    <rect class="inner" x="180" y="145" width="840" height="130" rx="0"/>

    <circle cx="190" cy="102" r="8" fill="#ff8fa3"/>
    <circle cx="222" cy="102" r="8" fill="#ffb3c1"/>
    <circle cx="254" cy="102" r="8" fill="#ffccd5"/>

    <text x="600" y="108" text-anchor="middle" class="small">
      light-red-hacker@yeager: ~/github-profile
    </text>

    <text x="600" y="198" text-anchor="middle" class="title">
      HI, I'M YEAGER
    </text>

    <text x="600" y="245" text-anchor="middle" class="subtitle">
      &gt; Frontend Developer | CSS | PHP | JavaScript | React
      <tspan class="cursor">_</tspan>
    </text>

    <rect class="scan" x="150" y="78" width="900" height="26"/>
  </g>
</svg>